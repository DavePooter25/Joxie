<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Important Question</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="hearts-bg" id="heartsBg"></div>

    <div class="book-overlay" id="bookOverlay">
        <div class="book" id="bookEl">
            <div class="book-icon" id="bookIcon">📕</div>
            <div class="book-page" id="bookPage">
                <p>Hey, I can feel there's some tension between us and it's bothering me. I don't want us holding onto bad feelings  can we talk about what's going on? I care about us more than being 'right' about anything.</p>
            </div>
        </div>
    </div>

    <div class="celebration" id="celebration">
        <canvas id="confettiCanvas"></canvas>
        <div class="love-text" id="loveText"></div>
    </div>

    <div class="card" id="questionCard">
        <!-- You can add an <img> tag here for Shrek if you have a local image link -->
        <h1>Hey, can  we talk? 🥺</h1>
        <div class="btn-container">
            <button id="yesBtn" onclick="celebrate()">Yes</button>
            <button id="noBtn">No</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
